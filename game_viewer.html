<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG Commander Game Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Courier New', monospace; background: #1a1a2e; color: #e0e0e0; padding: 12px; }
h1 { color: #c9a227; margin-bottom: 8px; font-size: 1.3em; }
.controls { margin-bottom: 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.controls select, .controls button, .controls input {
  background: #16213e; color: #e0e0e0; border: 1px solid #444; padding: 6px 10px;
  border-radius: 4px; font-family: inherit; font-size: 0.9em;
}
.controls button { cursor: pointer; background: #0f3460; }
.controls button:hover { background: #1a5276; }
.status-bar {
  background: #16213e; padding: 8px 12px; border-radius: 6px; margin-bottom: 12px;
  display: flex; justify-content: space-between; align-items: center;
}
.status-bar .turn { font-size: 1.2em; color: #c9a227; font-weight: bold; }
.status-bar .phase { color: #88c0d0; }
.status-bar .judge { color: #ff6b6b; font-weight: bold; animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: 0.5; } }

/* Two-column layout */
.main-layout { display: grid; grid-template-columns: 1fr 380px; gap: 12px; }
@media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }

.board-col { min-width: 0; }
.log-col { min-width: 0; }

.players { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px; margin-bottom: 12px; }
.player-card {
  background: #16213e; border-radius: 8px; padding: 10px; border: 2px solid #333;
  transition: border-color 0.3s;
}
.player-card.active { border-color: #c9a227; box-shadow: 0 0 8px rgba(201,162,39,0.3); }
.player-card.dead { opacity: 0.5; border-color: #600; }
.player-card .name { font-weight: bold; font-size: 1em; margin-bottom: 4px; }
.player-card .name .life { float: right; font-size: 1.2em; }
.player-card .life-high { color: #a3be8c; }
.player-card .life-mid { color: #ebcb8b; }
.player-card .life-low { color: #bf616a; }
.player-card .life-dead { color: #666; }
.player-card .stats { color: #888; font-size: 0.8em; margin-bottom: 6px; }
.player-card .zone { margin: 4px 0; }
.player-card .zone-label { color: #88c0d0; font-size: 0.75em; text-transform: uppercase; }
.player-card .creatures { color: #a3be8c; }
.player-card .lands { color: #8a8a6a; font-size: 0.8em; }
.player-card .other { color: #b48ead; }
.player-card .gy { color: #777; font-size: 0.8em; }
.player-card .cmd-dmg { color: #bf616a; font-size: 0.75em; }
.perm { display: inline-block; background: #0d1b2a; border: 1px solid #444; border-radius: 3px;
  padding: 1px 5px; margin: 1px; font-size: 0.8em; white-space: nowrap; }
.perm.tapped { opacity: 0.6; font-style: italic; }
.perm.sick { border-color: #665; }

/* Event log */
.event-log {
  background: #16213e; border-radius: 8px; padding: 10px;
  height: calc(100vh - 120px); overflow-y: auto; font-size: 0.8em; line-height: 1.6;
  position: sticky; top: 12px;
}
.event-log h3 { color: #c9a227; margin-bottom: 8px; font-size: 0.9em; }
.event-log .ev { padding: 0 0 1px 0; border-bottom: 1px solid #1a1a2e; }
.ev.turn-marker { color: #c9a227; font-weight: bold; margin-top: 8px; padding-top: 4px; border-top: 1px solid #333; }
.ev.judge { color: #ff6b6b; }
.ev.attack { color: #bf616a; }
.ev.cast { color: #a3be8c; }
.ev.land { color: #8a8a6a; }
.ev.trigger { color: #ebcb8b; }
.ev.damage { color: #d08770; }
.ev.death { color: #bf616a; font-weight: bold; }
.ev.rad { color: #b48ead; }
.ev.counter { color: #88c0d0; }
.ev.block { color: #5e81ac; }
.ev.new { background: rgba(201,162,39,0.1); }

.footer { margin-top: 12px; color: #555; font-size: 0.75em; text-align: center; }
</style>
</head>
<body>

<h1>Commander Game Viewer</h1>

<div class="controls">
  <select id="gameSelect"><option value="">Select a game...</option></select>
  <button onclick="refreshGames()">Refresh Games</button>
  <label><input type="checkbox" id="autoRefresh" checked> Auto 5s</label>
  <span id="lastUpdate" style="color:#666; font-size:0.8em;"></span>
</div>

<div id="gameView" style="display:none;">
  <div class="status-bar">
    <span class="turn" id="turnInfo">Turn ?</span>
    <span class="phase" id="phaseInfo"></span>
    <span id="judgeInfo"></span>
  </div>

  <div class="main-layout">
    <div class="board-col">
      <div class="players" id="playersGrid"></div>
    </div>
    <div class="log-col">
      <div class="event-log" id="eventLog">
        <h3>Game Log</h3>
        <div id="eventEntries"></div>
      </div>
    </div>
  </div>
</div>

<div class="footer">MTG Commander Game Viewer &mdash; http://127.0.0.1:8080</div>

<script>
const API = 'http://127.0.0.1:8080';
let currentGame = null;
let autoTimer = null;
let knownEventCount = 0;

async function api(endpoint, data = {}) {
  try {
    const resp = await fetch(`${API}/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    return await resp.json();
  } catch (e) {
    return { error: e.message };
  }
}

async function refreshGames() {
  const select = document.getElementById('gameSelect');
  const current = select.value;
  try {
    const data = await api('games');
    if (data.games) {
      select.innerHTML = '<option value="">Select a game...</option>';
      for (const g of data.games) {
        const opt = document.createElement('option');
        opt.value = g.game_id;
        opt.textContent = `${g.game_id} — T${g.turn} ${g.phase} (${g.players})`;
        select.appendChild(opt);
      }
      if (current) select.value = current;
    }
  } catch(e) {}
}

function selectGame() {
  const gid = document.getElementById('gameSelect').value;
  if (!gid) {
    document.getElementById('gameView').style.display = 'none';
    return;
  }
  currentGame = gid;
  knownEventCount = 0;
  document.getElementById('eventEntries').innerHTML = '';
  document.getElementById('gameView').style.display = 'block';
  updateGame();
}

function classifyEvent(text) {
  if (text.startsWith('---')) return 'turn-marker';
  if (text.includes('⚖')) return 'judge';
  if (text.includes('declares attackers') || text.includes('attacks for')) return 'attack';
  if (text.includes('Combat damage')) return 'damage';
  if (text.includes('blocked by') || text.includes('blocks')) return 'block';
  if (text.includes('☠') || text.includes('eliminated') || text.includes('dies')) return 'death';
  if (text.includes('⚡')) return 'trigger';
  if (text.includes('☢') || text.includes('rad')) return 'rad';
  if (text.includes('counter') || text.includes('proliferate')) return 'counter';
  if (text.includes('casts') || text.includes('activates')) return 'cast';
  if (text.includes('plays') && !text.includes('player')) return 'land';
  return '';
}

async function updateGame() {
  if (!currentGame) return;

  const priority = await api('priority', { game_id: currentGame });
  if (priority.error) {
    document.getElementById('turnInfo').textContent = 'Error';
    return;
  }

  // Status bar
  document.getElementById('turnInfo').textContent = `Turn ${priority.turn}`;
  document.getElementById('phaseInfo').textContent = priority.phase;

  const pq = priority.priority_queue || [];
  const judgeEl = document.getElementById('judgeInfo');
  if (pq.includes('JUDGE')) {
    judgeEl.className = 'judge';
    judgeEl.textContent = 'JUDGE CALL';
  } else if (pq.length > 0) {
    judgeEl.className = 'phase';
    judgeEl.textContent = `Priority: ${pq.map(n => n.split(' ')[0]).join(', ')}`;
  } else {
    judgeEl.textContent = '';
  }

  // Update event log (incremental — only add new events)
  const evData = await api('events', { game_id: currentGame });
  if (evData.events && evData.events.length > knownEventCount) {
    const entries = document.getElementById('eventEntries');
    const newEvents = evData.events.slice(knownEventCount);
    for (const ev of newEvents) {
      const div = document.createElement('div');
      div.className = `ev ${classifyEvent(ev)} new`;
      div.textContent = ev;
      entries.appendChild(div);
      // Remove "new" highlight after 3s
      setTimeout(() => div.classList.remove('new'), 3000);
    }
    knownEventCount = evData.events.length;
    // Auto-scroll to bottom
    const log = document.getElementById('eventLog');
    log.scrollTop = log.scrollHeight;
  }

  // Update player boards
  const players = priority.mulligan_order || [];
  const grid = document.getElementById('playersGrid');
  grid.innerHTML = '';

  for (const playerName of players) {
    const state = await api('state', { game_id: currentGame, player: playerName });
    const card = document.createElement('div');
    card.className = 'player-card';
    if (playerName === priority.active_player) card.classList.add('active');

    const stateText = state.state || '';
    const lifeMatch = stateText.match(/You are: .+ \| Life: (-?\d+)/);
    const life = lifeMatch ? parseInt(lifeMatch[1]) : 0;

    if (life <= 0 || life === -999) {
      card.classList.add('dead');
      card.innerHTML = `<div class="name">\u2620 ${playerName} <span class="life life-dead">DEAD</span></div>`;
      grid.appendChild(card);
      continue;
    }

    const lifeClass = life > 30 ? 'life-high' : life > 15 ? 'life-mid' : 'life-low';
    const marker = playerName === priority.active_player ? ' \u25C4' : '';

    let html = `<div class="name">${playerName}${marker} <span class="life ${lifeClass}">${life}</span></div>`;

    // Parse board from state text
    const lines = stateText.split('\n');
    let inSection = false;
    let lands = [], creatures = [], others = [], handSize = 0, gyCards = [], cmdZone = [], cmdDmg = [];

    for (const line of lines) {
      if (line.includes(`${playerName} (YOU)`) || line.includes(`${playerName} (life:`)) {
        inSection = true; continue;
      }
      if (inSection && line.match(/^── .+ \(life:/) && !line.includes(playerName)) { inSection = false; continue; }
      if (inSection && line.match(/^── .+ \(ELIMINATED/)) { inSection = false; continue; }
      if (line.includes('RECENT EVENTS') || line.includes('YOUR HAND')) { inSection = false; continue; }

      if (!inSection) {
        const hm = line.match(/YOUR HAND \((\d+)\)/);
        if (hm) handSize = parseInt(hm[1]);
        continue;
      }

      const t = line.trim();
      if (t.startsWith('Lands:')) lands = t.replace('Lands: ', '').split(', ').filter(Boolean);
      else if (t.startsWith('Hand:')) { const m = t.match(/Hand: (\d+)/); if (m) handSize = parseInt(m[1]); }
      else if (t.startsWith('Graveyard:')) gyCards = t.replace('Graveyard: ', '').split(', ').filter(Boolean);
      else if (t.startsWith('Command zone:')) cmdZone = t.replace('Command zone: ', '').split(', ').filter(Boolean);
      else if (t && !t.startsWith('──') && !t.startsWith('\u2554') && !t.startsWith('Available') && !t.startsWith('\u26A0')) {
        const isTapped = t.includes('[tapped]');
        const isSick = t.includes('[summoning sick]');
        if (t.match(/\(\d+\/\d+/)) {
          creatures.push({ tapped: isTapped, sick: isSick, full: t });
        } else if (!t.startsWith('[') && t.length > 2) {
          others.push({ name: t.split('[')[0].trim(), tapped: isTapped, full: t });
        }
      }
    }

    // Parse cmd damage and counters from the header line
    const headerMatch = stateText.match(new RegExp(`${playerName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}.*?\\(([^)]+)\\)`));
    let extraInfo = '';
    if (headerMatch) {
      const info = headerMatch[1];
      if (info.includes('cmd dmg')) extraInfo = info.replace(/life: \d+/, '').replace(/\|/, '').trim();
      if (info.includes('rad') || info.includes('poison') || info.includes('experience')) {
        extraInfo = info.replace(/life: \d+/, '').replace(/\|/, '').trim();
      }
    }

    html += `<div class="stats">${lands.length} lands \u00B7 ${creatures.length} creatures \u00B7 ${handSize} cards`;
    if (cmdZone.length) html += ` \u00B7 CMD: ${cmdZone.join(', ')}`;
    if (extraInfo) html += `<br><span class="cmd-dmg">${extraInfo}</span>`;
    html += `</div>`;

    if (creatures.length) {
      html += `<div class="zone"><span class="zone-label">Creatures</span><div class="creatures">`;
      for (const c of creatures) {
        const cls = ['perm']; if (c.tapped) cls.push('tapped'); if (c.sick) cls.push('sick');
        html += `<span class="${cls.join(' ')}" title="${c.full}">${c.full.substring(0, 45)}</span> `;
      }
      html += `</div></div>`;
    }

    if (others.length) {
      html += `<div class="zone"><span class="zone-label">Other</span><div class="other">`;
      for (const o of others) {
        const cls = ['perm']; if (o.tapped) cls.push('tapped');
        html += `<span class="${cls.join(' ')}" title="${o.full}">${o.name.substring(0, 30)}</span> `;
      }
      html += `</div></div>`;
    }

    if (lands.length) html += `<div class="zone"><span class="zone-label">Lands (${lands.length})</span><div class="lands">${lands.join(', ')}</div></div>`;
    if (gyCards.length) html += `<div class="zone"><span class="zone-label">Graveyard (${gyCards.length})</span><div class="gy">${gyCards.join(', ')}</div></div>`;

    card.innerHTML = html;
    grid.appendChild(card);
  }

  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
}

function toggleAuto() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  if (document.getElementById('autoRefresh').checked && currentGame) {
    autoTimer = setInterval(updateGame, 5000);
  }
}

document.getElementById('gameSelect').addEventListener('change', () => { selectGame(); toggleAuto(); });
document.getElementById('autoRefresh').addEventListener('change', toggleAuto);
refreshGames();
</script>
</body>
</html>
